name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - "build/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/build.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - "build/**"
      - "scripts/**"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      airflow_version: ${{ steps.version.outputs.airflow_version }}
      version: ${{ steps.version.outputs.version }}
      meta_tags: ${{ steps.version.outputs.meta_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Compute image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          airflow_version="$(python3 scripts/airflow-version)"
          short_sha="$(git rev-parse --short HEAD)"
          version="${airflow_version}-${short_sha}"

          {
            echo "airflow_version=${airflow_version}"
            echo "version=${version}"
            echo "meta_tags<<EOF"
            echo "type=raw,value=${version}"
            echo "type=raw,value=${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  docker:
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: Enucatl/docker-compose-security-baseline/.github/workflows/docker-ci.yml@main
    with:
      image_name: ghcr.io/enucatl/docker-airflow
      version: ${{ needs.prepare.outputs.version }}
      meta_tags: ${{ needs.prepare.outputs.meta_tags }}
      context: .
      dockerfile: build/Dockerfile
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
      fail_on_image_findings: false
      build_args: |
        AIRFLOW_VERSION=${{ needs.prepare.outputs.airflow_version }}
    secrets: inherit
